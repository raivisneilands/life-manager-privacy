<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Manager – Legal</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #6366f1;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: var(--text);
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    .links {
      margin-top: 30px;
    }

    .links a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      background: #1f2937;
      color: var(--text);
      transition: 0.2s;
    }

    .links a:hover {
      background: var(--accent);
    }

    .footer {
      margin-top: 30px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>Life Manager</h1>
    <p>Legal information</p>

    <div class="links">
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms of Service</a>
    </div>

    <div class="footer">
      © Life Manager
    </div>
  </div>
</div>

</body>
</html>
